name: Build Debug APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    env:
      DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: "8.7"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK packages
        run: |
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Build debug APK
        run: gradle :app:assembleDebug --no-daemon --stacktrace --warning-mode all

      
      - name: Extract SHA-1 from Keystore
        run: |
            keytool -list -v -keystore path/to/your/keystore.jks -alias ${{ secrets.KEY_ALIAS }} -storepass ${{ secrets.KEYSTORE_PASSWORD }} | grep SHA1
      
      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
     - name: Get APK SHA-1 Fingerprint
      run: |
        keytool -printcert -jarfile app/build/outputs/apk/release/app-release.apk | grep SHA1

      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: gradle-build-reports
          path: |
            **/build/reports/**
            **/build/outputs/logs/**
          if-no-files-found: ignore
