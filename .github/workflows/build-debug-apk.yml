
name: Build Debug APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    env:
      DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: "8.7"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK packages
        run: |
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Build debug APK
        run: gradle :app:assembleDebug --no-daemon --stacktrace --warning-mode all

      - name: Get debug APK SHA-1 fingerprint
        run: |
          APK_PATH="$(find app/build/outputs/apk/debug -type f -name '*.apk' | head -n 1)"

          if [ -z "$APK_PATH" ]; then
            echo "::error::No debug APK found under app/build/outputs/apk/debug"
            exit 1
          fi

          echo "APK_PATH=$APK_PATH"

          if ! keytool -printcert -jarfile "$APK_PATH" | grep -E "SHA1|SHA-1"; then
            echo "::error::Failed to extract SHA-1 fingerprint from $APK_PATH"
            exit 1
          fi

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: gradle-build-reports
          path: |
            **/build/reports/**
            **/build/outputs/logs/**
          if-no-files-found: ignore
