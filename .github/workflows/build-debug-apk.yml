name: Build Debug APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    env:
      DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: "8.7"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK packages
        run: |
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Build debug APK
        run: gradle :app:assembleDebug --no-daemon --stacktrace --warning-mode all

      - name: Get debug APK SHA-1 fingerprint
        run: |
          APK_PATH="$(find app/build/outputs/apk/debug -type f -name '*.apk' | head -n 1)"

          if [ -z "$APK_PATH" ]; then
            echo "::error::No debug APK found under app/build/outputs/apk/debug"
            exit 1
          fi

          echo "APK_PATH=$APK_PATH"

          APKSIGNER_PATH="$ANDROID_HOME/build-tools/35.0.0/apksigner"

          if [ ! -x "$APKSIGNER_PATH" ]; then
            APKSIGNER_PATH="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -n 1)"
          fi

          if [ -z "$APKSIGNER_PATH" ] || [ ! -x "$APKSIGNER_PATH" ]; then
            echo "::error::apksigner was not found under ANDROID_HOME/build-tools"
            exit 1
          fi

          echo "APKSIGNER_PATH=$APKSIGNER_PATH"

          if ! CERT_OUTPUT="$($APKSIGNER_PATH verify --print-certs "$APK_PATH" 2>&1)"; then
            echo "$CERT_OUTPUT"
            echo "::error::apksigner failed to verify $APK_PATH"
            exit 1
          fi

          echo "$CERT_OUTPUT"

          if ! echo "$CERT_OUTPUT" | grep -Eiq "SHA-1 digest|SHA1|SHA-1"; then
            echo "::error::SHA-1 certificate fingerprint was not found in apksigner output"
            exit 1
          fi

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: gradle-build-reports
          path: |
            **/build/reports/**
            **/build/outputs/logs/**
          if-no-files-found: ignore
